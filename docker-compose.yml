version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - careerpilot-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - embed
    networks:
      - careerpilot-net

  embed:
    build:
      context: ./embed
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - embed_cache:/root/.cache
    networks:
      - careerpilot-net

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - careerpilot-net

  db:
    image: ankane/pgvector
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=careerpilot
      - POSTGRES_USER=cpuser
      - POSTGRES_PASSWORD=cppass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - careerpilot-net

networks:
  careerpilot-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  embed_cache:
