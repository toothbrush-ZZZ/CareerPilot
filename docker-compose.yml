
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: 
        context: ./frontend
        args:
          # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
          # Change this value when deploying to a remote server.
          - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
